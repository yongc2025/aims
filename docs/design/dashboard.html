<!DOCTYPE html>
<html>
<head>
<title>AIMS Dashboard Prototype</title>
<style>
body {
 background:#050816;
 color:#ffffff;
 font-family:Arial;
}
.panel {
 background:#0B1220;
 border:1px solid #1d3557;
 padding:20px;
 margin:10px;
}
.blue {color:#00D4FF;}
.green {color:#00E676;}
.red {color:#FF5252;}
.grid {
 display:grid;
 grid-template-columns:repeat(4,1fr);
}
</style>
</head>
<body>

<h1 class="blue">AIMS</h1>
<p>AI Market Intelligence System</p>

<div class="grid">
<div class="panel">成交额</div>
<div class="panel">上涨数量</div>
<div class="panel">下跌数量</div>
<div class="panel">涨停数量</div>
</div>

<div class="panel">市场情绪趋势 (ECharts)</div>
<div class="panel">融资余额趋势 (ECharts)</div>
<div class="panel">行业板块热力图 (ECharts)</div>
<div class="panel">新闻情报流</div>

</body>
</html>
